<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="t d"><title id="t">Slaap en herstel na maagverkleining</title><desc id="d">Schema dat laat zien hoe slaap invloed heeft op herstel, keuzes en energie.</desc><rect width="1200" height="760" rx="48" fill="#394f7a"/><rect x="42" y="42" width="1116" height="676" rx="40" fill="#465e8d" stroke="#ccd6f6" stroke-width="4"/><rect x="98" y="138" width="1004" height="208" rx="34" fill="#f7fbfa"/><text x="144" y="204" font-family="Nunito,Arial,sans-serif" font-size="40" font-weight="800" fill="#1a2b28">Slaap beïnvloedt meer dan energie</text><text x="144" y="260" font-family="Inter,Arial,sans-serif" font-size="28" fill="#4a6b64">honger, herstel, keuzes en concentratie schuiven mee</text><rect x="98" y="396" width="286" height="220" rx="28" fill="#dff4ee"/><text x="140" y="456" font-family="Nunito,Arial,sans-serif" font-size="32" font-weight="800" fill="#1a2b28">Meer herstel</text><text x="140" y="504" font-family="Inter,Arial,sans-serif" font-size="24" fill="#4a6b64">beter ritme</text><text x="140" y="540" font-family="Inter,Arial,sans-serif" font-size="24" fill="#4a6b64">stabielere energie</text><rect x="456" y="396" width="286" height="220" rx="28" fill="#eef4ff"/><text x="498" y="456" font-family="Nunito,Arial,sans-serif" font-size="32" font-weight="800" fill="#1a2b28">Minder trek</text><text x="498" y="504" font-family="Inter,Arial,sans-serif" font-size="24" fill="#4a6b64">minder snackdrang</text><text x="498" y="540" font-family="Inter,Arial,sans-serif" font-size="24" fill="#4a6b64">betere keuzes</text><rect x="814" y="396" width="286" height="220" rx="28" fill="#fff1da"/><text x="856" y="456" font-family="Nunito,Arial,sans-serif" font-size="32" font-weight="800" fill="#1a2b28">Meer rust</text><text x="856" y="504" font-family="Inter,Arial,sans-serif" font-size="24" fill="#4a6b64">meer ruimte voor herstel</text><text x="856" y="540" font-family="Inter,Arial,sans-serif" font-size="24" fill="#4a6b64">minder opgejaagd</text></svg>