<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="t d"><title id="t">Altijd koud na afvallen</title><desc id="d">Schema met normale oorzaken, mogelijke tekorten en praktische tips bij kou na gewichtsverlies.</desc><rect width="1200" height="760" rx="48" fill="#5a7791"/><rect x="42" y="42" width="1116" height="676" rx="40" fill="#6888a4" stroke="#dce8f4" stroke-width="4"/><rect x="98" y="126" width="310" height="500" rx="34" fill="#f7fbfa"/><text x="138" y="188" font-family="Nunito,Arial,sans-serif" font-size="34" font-weight="800" fill="#1a2b28">Normaal herstel</text><text x="138" y="246" font-family="Inter,Arial,sans-serif" font-size="26" fill="#4a6b64">minder isolatie</text><text x="138" y="286" font-family="Inter,Arial,sans-serif" font-size="26" fill="#4a6b64">lagere energie-inname</text><text x="138" y="326" font-family="Inter,Arial,sans-serif" font-size="26" fill="#4a6b64">sneller afkoelen</text><rect x="446" y="126" width="310" height="500" rx="34" fill="#fff8f0"/><text x="486" y="188" font-family="Nunito,Arial,sans-serif" font-size="34" font-weight="800" fill="#1a2b28">Check dit mee</text><text x="486" y="246" font-family="Inter,Arial,sans-serif" font-size="26" fill="#4a6b64">ijzer en ferritine</text><text x="486" y="286" font-family="Inter,Arial,sans-serif" font-size="26" fill="#4a6b64">B12 en folaat</text><text x="486" y="326" font-family="Inter,Arial,sans-serif" font-size="26" fill="#4a6b64">klachtenpatroon</text><rect x="794" y="126" width="310" height="500" rx="34" fill="#eef4ff"/><text x="834" y="188" font-family="Nunito,Arial,sans-serif" font-size="34" font-weight="800" fill="#1a2b28">Wat helpt vaak</text><text x="834" y="246" font-family="Inter,Arial,sans-serif" font-size="26" fill="#4a6b64">laagjes</text><text x="834" y="286" font-family="Inter,Arial,sans-serif" font-size="26" fill="#4a6b64">voldoende eten</text><text x="834" y="326" font-family="Inter,Arial,sans-serif" font-size="26" fill="#4a6b64">rustig bewegen</text></svg>