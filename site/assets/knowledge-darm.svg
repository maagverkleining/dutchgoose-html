<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="t d"><title id="t">Darmgeluiden en rommel na maagverkleining</title><desc id="d">Visueel overzicht van normaal, opletten en arts bellen bij darmgeluiden.</desc><rect width="1200" height="760" rx="48" fill="#5f7760"/><rect x="42" y="42" width="1116" height="676" rx="40" fill="#6f8870" stroke="#d8e7d5" stroke-width="4"/><rect x="96" y="146" width="312" height="470" rx="34" fill="#f7fbfa"/><text x="140" y="208" font-family="Nunito,Arial,sans-serif" font-size="34" font-weight="800" fill="#1a2b28">Normaal</text><text x="140" y="268" font-family="Inter,Arial,sans-serif" font-size="26" fill="#4a6b64">na eten</text><text x="140" y="306" font-family="Inter,Arial,sans-serif" font-size="26" fill="#4a6b64">meer lucht</text><text x="140" y="344" font-family="Inter,Arial,sans-serif" font-size="26" fill="#4a6b64">snellere darmactiviteit</text><rect x="444" y="146" width="312" height="470" rx="34" fill="#fff8f0"/><text x="488" y="208" font-family="Nunito,Arial,sans-serif" font-size="34" font-weight="800" fill="#1a2b28">Opletten</text><text x="488" y="268" font-family="Inter,Arial,sans-serif" font-size="26" fill="#4a6b64">veel pijn</text><text x="488" y="306" font-family="Inter,Arial,sans-serif" font-size="26" fill="#4a6b64">blijvende misselijkheid</text><text x="488" y="344" font-family="Inter,Arial,sans-serif" font-size="26" fill="#4a6b64">eten vermijden uit angst</text><rect x="792" y="146" width="312" height="470" rx="34" fill="#fdeeee"/><text x="836" y="208" font-family="Nunito,Arial,sans-serif" font-size="34" font-weight="800" fill="#1a2b28">Arts bellen</text><text x="836" y="268" font-family="Inter,Arial,sans-serif" font-size="26" fill="#4a6b64">niet kunnen drinken</text><text x="836" y="306" font-family="Inter,Arial,sans-serif" font-size="26" fill="#4a6b64">aanhoudend braken</text><text x="836" y="344" font-family="Inter,Arial,sans-serif" font-size="26" fill="#4a6b64">hevige toenemende pijn</text></svg>