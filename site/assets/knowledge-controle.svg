<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="t d"><title id="t">Controleafspraken na maagverkleining</title><desc id="d">Tijdlijn met nacontroles, bloedwaarden en vragenlijst.</desc><rect width="1200" height="760" rx="48" fill="#4f6f7a"/><rect x="42" y="42" width="1116" height="676" rx="40" fill="#5f8290" stroke="#d7e6ea" stroke-width="4"/><text x="98" y="136" font-family="Nunito,Arial,sans-serif" font-size="44" font-weight="800" fill="#f7fbfa">Controle-afspraken</text><line x1="140" y1="256" x2="1060" y2="256" stroke="#d7e6ea" stroke-width="10" stroke-linecap="round"/><circle cx="220" cy="256" r="24" fill="#1a7c6b"/><circle cx="506" cy="256" r="24" fill="#1a7c6b"/><circle cx="792" cy="256" r="24" fill="#1a7c6b"/><circle cx="1048" cy="256" r="24" fill="#1a7c6b"/><text x="176" y="306" font-family="Inter,Arial,sans-serif" font-size="24" fill="#f7fbfa">eerste weken</text><text x="454" y="306" font-family="Inter,Arial,sans-serif" font-size="24" fill="#f7fbfa">3-12 maanden</text><text x="764" y="306" font-family="Inter,Arial,sans-serif" font-size="24" fill="#f7fbfa">1 jaar</text><text x="1006" y="306" font-family="Inter,Arial,sans-serif" font-size="24" fill="#f7fbfa">onderhoud</text><rect x="100" y="384" width="1000" height="250" rx="34" fill="#f7fbfa"/><text x="146" y="454" font-family="Nunito,Arial,sans-serif" font-size="36" font-weight="800" fill="#1a2b28">Neem deze vragen mee</text><text x="146" y="510" font-family="Inter,Arial,sans-serif" font-size="26" fill="#4a6b64">Welke bloedwaarden volgen we?</text><text x="146" y="552" font-family="Inter,Arial,sans-serif" font-size="26" fill="#4a6b64">Passen mijn klachten nog bij herstel?</text><text x="146" y="594" font-family="Inter,Arial,sans-serif" font-size="26" fill="#4a6b64">Moet timing of dosering veranderen?</text></svg>