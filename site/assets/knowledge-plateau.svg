<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="t d"><title id="t">Plateau na maagverkleining</title><desc id="d">Visuele beslisboom met early stall, herstel en echt plateau.</desc><rect width="1200" height="760" rx="48" fill="#7a6147"/><rect x="42" y="42" width="1116" height="676" rx="40" fill="#8a7054" stroke="#ead8bf" stroke-width="4"/><text x="94" y="144" font-family="Nunito,Arial,sans-serif" font-size="44" font-weight="800" fill="#fff8f0">Stall of echt plateau?</text><rect x="94" y="190" width="1012" height="148" rx="28" fill="#fff8f0"/><text x="142" y="252" font-family="Inter,Arial,sans-serif" font-size="30" fill="#5d4a38">Kijk eerst naar fase, vocht, ontlasting, slapen en structuur.</text><rect x="94" y="390" width="286" height="240" rx="28" fill="#dff4ee"/><text x="136" y="450" font-family="Nunito,Arial,sans-serif" font-size="34" font-weight="800" fill="#1a2b28">Early stall</text><text x="136" y="500" font-family="Inter,Arial,sans-serif" font-size="24" fill="#4a6b64">eerste weken</text><text x="136" y="536" font-family="Inter,Arial,sans-serif" font-size="24" fill="#4a6b64">vaak normaal</text><rect x="456" y="390" width="286" height="240" rx="28" fill="#eef4ff"/><text x="498" y="450" font-family="Nunito,Arial,sans-serif" font-size="34" font-weight="800" fill="#1a2b28">Herstelcheck</text><text x="498" y="500" font-family="Inter,Arial,sans-serif" font-size="24" fill="#4a6b64">eiwit, slaap, NEAT</text><text x="498" y="536" font-family="Inter,Arial,sans-serif" font-size="24" fill="#4a6b64">niet alleen gewicht</text><rect x="818" y="390" width="286" height="240" rx="28" fill="#fff1da"/><text x="860" y="450" font-family="Nunito,Arial,sans-serif" font-size="34" font-weight="800" fill="#1a2b28">Echt plateau</text><text x="860" y="500" font-family="Inter,Arial,sans-serif" font-size="24" fill="#4a6b64">wekenlang gelijk</text><text x="860" y="536" font-family="Inter,Arial,sans-serif" font-size="24" fill="#4a6b64">context meewegen</text></svg>