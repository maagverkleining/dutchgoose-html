<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="t d"><title id="t">Emotie-eten na maagverkleining</title><desc id="d">Toolkit met stop, ademen, uitstellen en steun zoeken.</desc><rect width="1200" height="760" rx="48" fill="#6f6a8c"/><rect x="42" y="42" width="1116" height="676" rx="40" fill="#7e79a0" stroke="#ddd9f0" stroke-width="4"/><text x="96" y="138" font-family="Nunito,Arial,sans-serif" font-size="44" font-weight="800" fill="#f7fbfa">Acute toolkit bij emotie-eten</text><rect x="96" y="196" width="470" height="410" rx="34" fill="#f7fbfa"/><text x="142" y="262" font-family="Nunito,Arial,sans-serif" font-size="34" font-weight="800" fill="#1a2b28">In het moment</text><text x="142" y="320" font-family="Inter,Arial,sans-serif" font-size="26" fill="#4a6b64">stop 10 minuten</text><text x="142" y="360" font-family="Inter,Arial,sans-serif" font-size="26" fill="#4a6b64">drink of loop even</text><text x="142" y="400" font-family="Inter,Arial,sans-serif" font-size="26" fill="#4a6b64">check: hoofd of buik?</text><rect x="634" y="196" width="470" height="410" rx="34" fill="#f7fbfa"/><text x="680" y="262" font-family="Nunito,Arial,sans-serif" font-size="34" font-weight="800" fill="#1a2b28">Daarna</text><text x="680" y="320" font-family="Inter,Arial,sans-serif" font-size="26" fill="#4a6b64">kijk naar patroon</text><text x="680" y="360" font-family="Inter,Arial,sans-serif" font-size="26" fill="#4a6b64">maak 1 vaste noodroute</text><text x="680" y="400" font-family="Inter,Arial,sans-serif" font-size="26" fill="#4a6b64">zoek steun als het terugkomt</text></svg>